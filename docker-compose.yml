version: '3.8'

services:
  bot:
    build: .
    networks:
      - 1panel-network
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./config.toml:/app/config.toml
    command: python -m src.bot.main
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import sys; sys.exit(0)\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api:
    build: .
    networks:
      - 1panel-network
    ports:
      - "17985:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./config.toml:/app/config.toml
    command: python -m src.api.main
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\"" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  1panel-network:
    external: true
