<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{% block title %}Nebuluxe 验证{% endblock %}</title>

    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Google Fonts: Space Grotesk for bold headers, Outfit for friendly body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@500;700;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#4338CA',
                            pink: '#EC4899',
                            yellow: '#FBBF24',
                            green: '#10B981',
                            black: '#0F172A',
                            bg: '#FFFDF0'
                        }
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px 0px #0F172A',
                        'brutal-lg': '8px 8px 0px 0px #0F172A',
                        'brutal-sm': '2px 2px 0px 0px #0F172A',
                    }
                }
            }
        }
    </script>

    <!-- Neo-Brutalism Custom Styles -->
    <style>
        :root {
            --tg-theme-bg-color: var(--tg-theme-bg-color, #FFFDF0);
            --tg-theme-text-color: var(--tg-theme-text-color, #0F172A);
        }

        body {
            /* Fallback to brand-bg if Telegram theme doesn't force a dark mode, 
               Brutalism needs a vibrant or punchy background. */
            background-color: #FFFDF0;
            color: #0F172A;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(#0F172A 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0;
            /* Slight opacity to the dots */
            background-color: rgba(255, 253, 240, 0.95);
        }

        /* --- BRUTALIST COMPONENTS --- */
        .brutal-card {
            background-color: #FFFFFF;
            border: 3px solid #0F172A;
            border-radius: 12px;
            box-shadow: 6px 6px 0px 0px #0F172A;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .brutal-btn {
            background-color: #4338CA;
            /* Brand Blue */
            color: #FFFFFF;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.125rem;
            padding: 12px 24px;
            border: 3px solid #0F172A;
            border-radius: 8px;
            box-shadow: 4px 4px 0px 0px #0F172A;
            cursor: pointer;
            transition: all 0.15s ease-out;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .brutal-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px 0px #0F172A;
        }

        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px 0px #0F172A;
        }

        .brutal-btn-pink {
            background-color: #EC4899;
        }

        .brutal-btn-yellow {
            background-color: #FBBF24;
            color: #0F172A;
        }

        /* --- ANIMATIONS --- */
        .animate-float {
            display: inline-block !important;
            transform-origin: center center;
            -webkit-animation: float 3s ease-in-out infinite;
            animation: float 3s ease-in-out infinite;
        }

        @-webkit-keyframes float {
            0% {
                -webkit-transform: translateY(0px);
                transform: translateY(0px);
            }

            50% {
                -webkit-transform: translateY(-10px);
                transform: translateY(-10px);
            }

            100% {
                -webkit-transform: translateY(0px);
                transform: translateY(0px);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-wiggle {
            display: inline-block !important;
            transform-origin: center center;
            -webkit-animation: wiggle 2s linear infinite;
            animation: wiggle 2s linear infinite;
        }

        @-webkit-keyframes wiggle {

            0%,
            7% {
                -webkit-transform: rotateZ(0);
                transform: rotateZ(0);
            }

            15% {
                -webkit-transform: rotateZ(-8deg);
                transform: rotateZ(-8deg);
            }

            20% {
                -webkit-transform: rotateZ(6deg);
                transform: rotateZ(6deg);
            }

            25% {
                -webkit-transform: rotateZ(-8deg);
                transform: rotateZ(-8deg);
            }

            30% {
                -webkit-transform: rotateZ(4deg);
                transform: rotateZ(4deg);
            }

            35%,
            100% {
                -webkit-transform: rotateZ(0);
                transform: rotateZ(0);
            }
        }

        @keyframes wiggle {

            0%,
            7% {
                transform: rotateZ(0);
            }

            15% {
                transform: rotateZ(-8deg);
            }

            20% {
                transform: rotateZ(6deg);
            }

            25% {
                transform: rotateZ(-8deg);
            }

            30% {
                transform: rotateZ(4deg);
            }

            35%,
            100% {
                transform: rotateZ(0);
            }
        }

        .error-shake {
            animation: brutalShake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border-color: #EF4444;
            background-color: #FEF2F2;
        }

        @keyframes brutalShake {

            10%,
            90% {
                transform: translate3d(-2px, 0, 0) rotate(-1deg);
            }

            20%,
            80% {
                transform: translate3d(4px, 0, 0) rotate(2deg);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-6px, 0, 0) rotate(-2deg);
                box-shadow: 8px 8px 0px 0px #EF4444;
            }

            40%,
            60% {
                transform: translate3d(6px, 0, 0) rotate(2deg);
            }
        }

        .success-pop {
            animation: brutalPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-color: #10B981;
        }

        @keyframes brutalPop {
            0% {
                transform: scale(0.8) translateY(20px);
                opacity: 0;
                box-shadow: 0 0 0 #0F172A;
            }

            50% {
                transform: scale(1.05) translateY(-5px);
                box-shadow: 8px 8px 0px #10B981;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
                box-shadow: 6px 6px 0px #0F172A;
            }
        }

        /* Loading Spinner Brutalist */
        .brutal-spinner {
            width: 24px;
            height: 24px;
            border: 4px solid #0F172A;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Helpers */
        .text-fg {
            color: #0F172A;
        }

        .text-fg-secondary {
            color: #475569;
        }

        .text-fg-hint {
            color: #64748B;
        }

        .text-fg-link {
            color: #4338CA;
            font-weight: 700;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
        }

        .text-fg-link:hover {
            color: #EC4899;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body>
    <div class="min-h-screen flex flex-col">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Initialize Telegram Web App
        const tg = window.Telegram.WebApp;

        // Configure the app
        tg.ready();
        tg.expand();

        // Set header color
        tg.setHeaderColor('secondary_bg_color');

        // Disable closing confirmation for better UX
        tg.disableClosingConfirmation();

        // Global error handler
        window.addEventListener('error', function (e) {
            console.error('Global error:', e.error);
        });

        // Show/hide loading
        function showLoading(element, text = '处理中...') {
            if (element) {
                element.innerHTML = `<span class="loading-spinner"></span>${text}`;
                element.disabled = true;
            }
        }

        function hideLoading(element, text = '继续') {
            if (element) {
                element.innerHTML = text;
                element.disabled = false;
            }
        }

        // Show success message
        function showSuccess(message) {
            const container = document.getElementById('message-container');
            if (container) {
                container.innerHTML = `
                    <div class="card success-animation">
                        <div class="text-center">
                            <div class="text-4xl mb-4">✅</div>
                            <div class="text-lg font-medium text-green-600">${message}</div>
                        </div>
                    </div>
                `;
            }
        }

        // Show error message
        function showError(message) {
            const container = document.getElementById('message-container');
            if (container) {
                container.innerHTML = `
                    <div class="card error-shake">
                        <div class="text-center">
                            <div class="text-4xl mb-4">❌</div>
                            <div class="text-lg font-medium text-red-600">${message}</div>
                        </div>
                    </div>
                `;
            }
        }

        // Close the web app
        function closeWebApp() {
            tg.close();
        }

        // Haptic feedback
        function hapticSuccess() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function hapticError() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('error');
            }
        }
    </script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
