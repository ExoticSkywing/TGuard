{% extends "base.html" %}

{% block title %}验证已完成 - Nebuluxe{% endblock %}

{% block content %}
<div class="flex-1 flex flex-col p-4 w-full max-w-md mx-auto justify-center">
    <div class="brutal-card bg-brand-blue p-6 text-center text-white relative">
        <div class="absolute -top-4 -right-4 text-5xl animate-wiggle">🛸</div>

        <div class="text-center">
            <div class="text-7xl mb-4 transform hover:scale-110 transition-transform">✅</div>
            <h1 class="font-display text-4xl font-black mb-3 uppercase tracking-wider"
                style="text-shadow: 4px 4px 0px #0F172A;">任务搞定！</h1>
            <p
                class="font-sans font-bold text-lg bg-white text-brand-black inline-block px-4 py-2 border-2 border-brand-black rounded-sm shadow-brutal-sm transform -rotate-1 mb-6">
                {{ message }}
            </p>

            <div
                class="bg-brand-green border-[6px] border-brand-black p-5 mb-6 shadow-[8px_8px_0px_#0F172A] transform rotate-1 text-brand-black">
                <div class="font-display font-black text-2xl mb-4 uppercase tracking-widest text-[#FCD34D] bg-brand-black inline-block px-3 py-1 transform -rotate-2"
                    style="border: 2px solid white;">📋 实时战况</div>
                <div class="text-left space-y-4 text-sm font-bold bg-white p-4 border-4 border-brand-black">
                    <div
                        class="flex items-center space-x-3 bg-gray-50 p-2 border-2 border-brand-black shadow-[4px_4px_0px_#0F172A]">
                        <span class="text-3xl animate-wiggle">💪</span>
                        <span class="text-lg uppercase tracking-wide">身份识别：纯种人类</span>
                    </div>
                    <div
                        class="flex items-center space-x-3 bg-brand-green/20 p-2 border-2 border-brand-black shadow-[4px_4px_0px_#0F172A]">
                        <span class="text-3xl animate-float">🚀</span>
                        <span class="text-lg text-brand-black">权限已激活，请返回群聊！</span>
                    </div>
                </div>
            </div>

            <div
                class="bg-brand-yellow text-brand-black font-display font-black text-lg border-[6px] border-brand-black p-4 mb-8 shadow-[6px_6px_0px_#0F172A] transform -rotate-1">
                <span class="bg-brand-black text-white px-2 py-1 mr-2 animate-pulse inline-block">TIP</span>
                您已经是通过验证的贵宾了！
            </div>

            <button class="brutal-btn brutal-btn-yellow w-full text-lg py-3" onclick="closeWebApp()">
                🔙 闪现回 Telegram
            </button>

            <div class="mt-8 border-t-4 border-brand-black pt-4 flex flex-col items-center text-white">
                <p class="font-sans font-bold text-sm mb-2 opacity-80">叮！你将收到接驳舱的提醒 🔔</p>
                <p class="font-sans font-bold text-sm bg-brand-black px-3 py-1 rounded">
                    ⚡ <a href="https://t.me/nebuluxe" target="_blank"
                        class="text-brand-pink hover:text-white transition-colors">Nebuluxe</a> 强力驱动
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Auto-close after 15 seconds to give users enough time to read the funny copy
    setTimeout(() => {
        closeWebApp();
    }, 15000);

    // Show back button
    tg.BackButton.show();
    tg.BackButton.onClick(function () {
        tg.close();
    });
</script>
{% endblock %}
